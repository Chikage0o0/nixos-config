"$schema" = 'https://starship.rs/config-schema.json'

# 一行、按需显示：身份与位置恒定，执行上下文只在需要处理时出现。
add_newline = false
scan_timeout = 30
command_timeout = 300
format = "$username$hostname $directory$git_branch$git_status$jobs$cmd_duration$status$character"

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
style_user = 'bold fg:color_blue'
style_root = 'bold fg:color_red'
format = '[$user]($style)'

[hostname]
# 不以 SSH 环境变量判断；所有会话均显示稳定的机器标识。
ssh_only = false
detect_env_vars = []
trim_at = ''
disabled = false
style = 'fg:color_aqua'
format = '[@$hostname]($style)'

[directory]
style = 'fg:color_fg0'
format = '[$path]($style)'
truncation_length = 3
truncation_symbol = '…/'
truncate_to_repo = true
home_symbol = '~'

[git_branch]
symbol = 'git:'
style = 'fg:color_aqua'
format = ' [${symbol}$branch]($style)'

[git_status]
style = 'fg:color_yellow'
format = ' [$all_status$ahead_behind]($style)'
conflicted = '='
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?'
stashed = '*'
modified = '!'
staged = '+'
renamed = '»'
deleted = 'x'

[jobs]
symbol = 'jobs:'
style = 'fg:color_purple'
format = ' [$symbol$number]($style)'

[cmd_duration]
min_time = 2_000
style = 'fg:color_orange'
format = ' [$duration]($style)'

[status]
disabled = false
style = 'fg:color_red'
format = ' [exit:$status]($style)'

[character]
disabled = false
success_symbol = ' [❯](bold fg:color_green) '
error_symbol = ' [❯](bold fg:color_red) '
vimcmd_symbol = ' [❮](bold fg:color_green) '
vimcmd_replace_one_symbol = ' [❮](bold fg:color_purple) '
vimcmd_replace_symbol = ' [❮](bold fg:color_purple) '
vimcmd_visual_symbol = ' [❮](bold fg:color_yellow) '
